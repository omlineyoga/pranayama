<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pranayamas · OMLINE</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#F3EEE6;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:1rem;}
:root{
  --a0b:#E1F5EE;--a0t:#085041;--a0e:#1D9E75;
  --a1b:#E6F1FB;--a1t:#0C447C;--a1e:#378ADD;
  --a2b:#EEEDFE;--a2t:#3C3489;--a2e:#7F77DD;
  --a3b:#FBEAF0;--a3t:#72243E;--a3e:#D4537E;
  --a4b:#FAEEDA;--a4t:#633806;--a4e:#BA7517;
  --a5b:#FAECE7;--a5t:#4A1B0C;--a5e:#D85A30;
  --a6b:#EAF3DE;--a6t:#173404;--a6e:#639922;
  --ct-primary:#1a1a1a;--ct-secondary:#555;
  --cb-primary:#fff;--cb-secondary:#f0f0f0;
  --cborder:#ddd;
}
@media(prefers-color-scheme:dark){
  :root{
    --a0b:#04342C;--a0t:#9FE1CB;
    --a1b:#042C53;--a1t:#B5D4F4;
    --a2b:#26215C;--a2t:#CECBF6;
    --a3b:#4B1528;--a3t:#F4C0D1;
    --a4b:#412402;--a4t:#FAC775;
    --a5b:#4A1B0C;--a5t:#F0997B;
    --a6b:#173404;--a6t:#C0DD97;
    --ct-primary:#f0f0f0;--ct-secondary:#aaa;
    --cb-primary:#12141A;--cb-secondary:#1e2230;
    --cborder:#333;
  }
  body{background:#0C0F18;}
  #bg-light{display:none;}#bg-dark{display:block;}
  .pt,.rp,.lvbtn{background:rgba(8,12,22,0.65)!important;color:var(--ct-secondary)!important;}
  .lvbtn.on{background:rgba(8,12,22,0.9)!important;color:var(--ct-primary)!important;}
}
#orb{transition:transform 4s ease-in-out,background-color 0.5s;}
#wrap{position:relative;overflow:hidden;border-radius:16px;width:100%;max-width:680px;}
.pt{padding:4px 11px;border-radius:20px;border:0.5px solid var(--cborder);background:rgba(255,255,255,0.62);color:var(--ct-secondary);font-size:12px;cursor:pointer;line-height:1.5;}
.rp{padding:3px 9px;border-radius:6px;font-size:11px;background:rgba(255,255,255,0.65);color:var(--ct-secondary);}
.lvbtn{padding:4px 12px;border-radius:20px;border:0.5px solid var(--cborder);background:rgba(255,255,255,0.62);color:var(--ct-secondary);font-size:12px;cursor:pointer;}
.lvbtn.on{background:rgba(255,255,255,0.94);color:var(--ct-primary);font-weight:600;border-color:#aaa;}
button#playbtn{padding:7px 26px;border-radius:20px;border:0.5px solid var(--cborder);background:rgba(255,255,255,0.7);color:var(--ct-primary);font-size:13px;cursor:pointer;}
select{padding:6px 10px;border-radius:20px;border:0.5px solid var(--cborder);background:rgba(255,255,255,0.7);color:var(--ct-primary);font-size:12px;cursor:pointer;}
p#desc{font-size:12px;color:var(--ct-secondary);margin:0 0 7px;min-height:2.1em;line-height:1.6;}
p#prog{text-align:center;font-size:12px;color:var(--ct-secondary);margin-top:7px;min-height:1.4em;padding-bottom:0.5rem;}
</style>
</head>

        <line x1="0" y1="-108" x2="0" y2="-120" transform="rotate(210)"/>
        <line x1="0" y1="-108" x2="0" y2="-120" transform="rotate(240)"/>
        <line x1="0" y1="-108" x2="0" y2="-120" transform="rotate(270)"/>
        <line x1="0" y1="-108" x2="0" y2="-120" transform="rotate(300)"/>
        <line x1="0" y1="-108" x2="0" y2="-120" transform="rotate(330)"/>
        <polygon points="0,-73 63.2,36.5 -63.2,36.5"/>
        <polygon points="0,73 63.2,-36.5 -63.2,-36.5"/>
        <circle r="32"/><circle cx="32" r="32"/>
        <circle cx="16" cy="27.7" r="32"/><circle cx="-16" cy="27.7" r="32"/>
        <circle cx="-32" r="32"/><circle cx="-16" cy="-27.7" r="32"/>
        <circle cx="16" cy="-27.7" r="32"/>
        <circle r="51"/><circle r="46"/>
      </g>
    </svg>

    <div id="orb" style="position:relative;z-index:2;width:88px;height:88px;border-radius:50%;background:rgba(240,245,242,0.84);display:flex;flex-direction:column;align-items:center;justify-content:center;transform:scale(1);gap:2px;box-shadow:0 0 0 1px rgba(255,255,255,0.45);">
      <span id="plabel" style="font-size:11px;letter-spacing:0.06em;color:var(--ct-secondary);">·</span>
      <span id="pnum" style="font-size:26px;font-weight:600;color:var(--ct-primary);line-height:1;">—</span>
    </div>
  </div>

  <div style="display:flex;justify-content:center;gap:10px;align-items:center;margin-top:0.5rem;">
    <button id="playbtn" onclick="togglePlay()">Iniciar</button>
    <select id="cycsel">
      <option value="3">3 ciclos</option>
      <option value="5" selected>5 ciclos</option>
      <option value="7">7 ciclos</option>
      <option value="10">10 ciclos</option>
      <option value="0">Sin límite</option>
    </select>
  </div>
  <p id="prog"></p>
</div>
</div>

<script>
const T=[
  {name:"Sama Vritti",
   full:[{l:"INHALA",d:6,t:"i"},{l:"RETÉN",d:6,t:"hi"},{l:"EXHALA",d:6,t:"e"},{l:"RETÉN",d:6,t:"he"}],
   basic:[{l:"INHALA",d:3,t:"i"},{l:"RETÉN",d:3,t:"hi"},{l:"EXHALA",d:3,t:"e"},{l:"RETÉN",d:3,t:"he"}],
   desc:"Respiración cuadrada — 4 fases iguales. Calma y equilibra el sistema nervioso central.",a:0},
  {name:"Ujjayi",
   full:[{l:"INHALA",d:4,t:"i"},{l:"EXHALA",d:8,t:"e"}],
   basic:[{l:"INHALA",d:3,t:"i"},{l:"EXHALA",d:6,t:"e"}],
   desc:"Con sonido oceánico suave en la garganta (glotis semicerrada). Calienta y energiza durante asanas.",a:1},
  {name:"Chandra Bhedana",
   full:[{l:"INHALA izq",d:4,t:"i"},{l:"RETÉN",d:4,t:"hi"},{l:"EXHALA der",d:8,t:"e"}],
   basic:[{l:"INHALA izq",d:3,t:"i"},{l:"EXHALA der",d:6,t:"e"}],
   desc:"Canal lunar (ida). Inhala por fosa izquierda, exhala por derecha. Enfría el cuerpo y calma la mente.",a:2},
  {name:"Surya Bhedana",
   full:[{l:"INHALA der",d:4,t:"i"},{l:"RETÉN",d:4,t:"hi"},{l:"EXHALA izq",d:8,t:"e"}],
   basic:[{l:"INHALA der",d:3,t:"i"},{l:"EXHALA izq",d:6,t:"e"}],
   desc:"Canal solar (pingalá). Inhala por fosa derecha, exhala por izquierda. Calienta y activa la energía vital.",a:5},
  {name:"Nadi Shodhana",
   full:[{l:"INHALA der",d:4,t:"i"},{l:"RETÉN",d:8,t:"hi"},{l:"EXHALA izq",d:8,t:"e"},{l:"RETÉN",d:4,t:"he"},
         {l:"INHALA izq",d:4,t:"i"},{l:"RETÉN",d:8,t:"hi"},{l:"EXHALA der",d:8,t:"e"},{l:"RETÉN",d:4,t:"he"}],
   basic:[{l:"INHALA der",d:3,t:"i"},{l:"EXHALA izq",d:6,t:"e"},{l:"INHALA izq",d:3,t:"i"},{l:"EXHALA der",d:6,t:"e"}],
   desc:"Inhala der → exhala izq → inhala izq → exhala der = 1 ciclo. Purifica y equilibra ambos hemisferios.",a:6},
  {name:"4 · 7 · 8",
   full:[{l:"INHALA",d:4,t:"i"},{l:"RETÉN",d:7,t:"hi"},{l:"EXHALA",d:8,t:"e"}],
   basic:[{l:"INHALA",d:4,t:"i"},{l:"EXHALA",d:8,t:"e"}],
   desc:"Activa el nervio vago. Reduce la ansiedad aguda y facilita el sueño profundo.",a:3},
  {name:"Bhramari",
   full:[{l:"INHALA",d:4,t:"i"},{l:"ZUMBA",d:8,t:"e"}],
   basic:[{l:"INHALA",d:3,t:"i"},{l:"ZUMBA",d:6,t:"e"}],
   desc:"Exhala con zumbido suave (boca cerrada). Calma el sistema nervioso al instante. Activa el nervio vago.",a:4}
];

let c=0,pi=0,tl=0,run=false,tmr=null,done=0,lvl=0;
const v=(i,k)=>`var(--a${i}${k})`;
function ps(){return lvl===0?T[c].basic:T[c].full;}

let actx=null,soundOn=false,curSnd=null,noiseBuf=null;
function initAudio(){
  if(actx)return;
  try{
    actx=new(window.AudioContext||window.webkitAudioContext)();
    const sz=actx.sampleRate*3,buf=actx.createBuffer(1,sz,actx.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<sz;i++)d[i]=Math.random()*2-1;
    noiseBuf=buf;
  }catch(e){actx=null;}
}
function stopSnd(){if(curSnd){try{curSnd.stop();}catch(e){}curSnd=null;}}
function playSnd(phase){
  if(!soundOn||!actx||!noiseBuf)return;
  stopSnd();
  const now=actx.currentTime,dur=phase.d;
  if(phase.t==='hi'||phase.t==='he')return;
  const g=actx.createGain(),fade=Math.min(0.3,dur*0.12);
  g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(0.12,now+fade);
  g.gain.setValueAtTime(0.12,now+dur-fade);g.gain.linearRampToValueAtTime(0,now+dur);
  g.connect(actx.destination);
  if(phase.l==='ZUMBA'){
    const o=actx.createOscillator();o.type='sine';o.frequency.value=215;
    o.connect(g);o.start();o.stop(now+dur+0.1);curSnd=o;
  }else{
    const src=actx.createBufferSource();src.buffer=noiseBuf;src.loop=true;
    const f=actx.createBiquadFilter();f.type='bandpass';f.Q.value=1.1;
    const isIn=phase.t==='i';
    f.frequency.setValueAtTime(isIn?340:720,now);
    f.frequency.linearRampToValueAtTime(isIn?720:340,now+dur);
    src.connect(f);f.connect(g);src.start();curSnd=src;
  }
}
function toggleSound(){
  initAudio();soundOn=!soundOn;
  const btn=document.getElementById('soundbtn');
  btn.innerHTML=soundOn
    ?'<i class="ti ti-volume" style="font-size:14px;vertical-align:-2px;margin-right:3px;"></i>Sonido'
    :'<i class="ti ti-volume-off" style="font-size:14px;vertical-align:-2px;margin-right:3px;"></i>Sonido';
  if(!soundOn)stopSnd();
}
function buildTabs(){
  const el=document.getElementById('tabs');el.innerHTML='';
  T.forEach((t,i)=>{
    const b=document.createElement('button');b.className='pt';b.textContent=t.name;
    if(i===c){b.style.background=v(t.a,'b');b.style.color=v(t.a,'t');b.style.borderColor=v(t.a,'e');b.style.fontWeight='600';}
    b.onclick=()=>selTech(i);el.appendChild(b);
  });
}
function buildRatio(active){
  const el=document.getElementById('rpills');el.innerHTML='';
  const phases=ps();
  phases.forEach((p,i)=>{
    const sp=document.createElement('span');sp.className='rp';sp.textContent=p.l+' '+p.d+'s';
    if(i===active){sp.style.background=v(T[c].a,'b');sp.style.color=v(T[c].a,'t');sp.style.fontWeight='600';}
    el.appendChild(sp);
    if(i<phases.length-1){const ar=document.createElement('span');ar.style.cssText='color:var(--ct-secondary);font-size:10px;padding:0 1px;';ar.textContent='›';el.appendChild(ar);}
  });
}
function selTech(i){
  if(run)stopPlay();c=i;buildTabs();
  document.getElementById('desc').textContent=T[c].desc;
  document.getElementById('geom-svg').style.color=v(T[c].a,'e');
  buildRatio(-1);resetOrb();done=0;document.getElementById('prog').textContent='';
}
function setLevel(l){
  if(run)stopPlay();lvl=l;
  document.getElementById('lvl0').classList.toggle('on',l===0);
  document.getElementById('lvl1').classList.toggle('on',l===1);
  buildRatio(-1);resetOrb();done=0;document.getElementById('prog').textContent='';
}
function resetOrb(){
  const o=document.getElementById('orb');
  o.style.transitionDuration='0.5s';o.style.transform='scale(1)';
  o.style.backgroundColor='rgba(240,245,242,0.84)';
  document.getElementById('plabel').textContent='·';document.getElementById('plabel').style.color='var(--ct-secondary)';
  document.getElementById('pnum').textContent='—';document.getElementById('pnum').style.color='var(--ct-primary)';
}
function startPhase(idx){
  pi=idx;const phases=ps(),p=phases[idx];tl=p.d;
  const o=document.getElementById('orb'),a=T[c].a;
  document.getElementById('plabel').textContent=p.l;document.getElementById('plabel').style.color=v(a,'t');
  document.getElementById('pnum').textContent=String(tl);document.getElementById('pnum').style.color=v(a,'t');
  o.style.backgroundColor=v(a,'b');
  if(p.t==='i'){o.style.transitionDuration=p.d+'s';o.style.transform='scale(1.68)';}
  else if(p.t==='hi'){o.style.transitionDuration='0.2s';o.style.transform='scale(1.68)';}
  else if(p.t==='e'){o.style.transitionDuration=p.d+'s';o.style.transform='scale(1)';}
  else{o.style.transitionDuration='0.2s';o.style.transform='scale(1)';}
  buildRatio(idx);playSnd(p);
}
function updateProg(){
  const max=parseInt(document.getElementById('cycsel').value);
  document.getElementById('prog').textContent=max===0?'Ciclo '+(done+1)+' · sin límite':'Ciclo '+(done+1)+' de '+max;
}
function tick(){
  tl--;
  if(tl>0){document.getElementById('pnum').textContent=String(tl);return;}
  const phases=ps();
  if(pi<phases.length-1){startPhase(pi+1);}
  else{
    done++;
    const max=parseInt(document.getElementById('cycsel').value);
    if(max>0&&done>=max){stopPlay();document.getElementById('prog').textContent='Completado — '+done+' ciclos';return;}
    startPhase(0);updateProg();
  }
}
function togglePlay(){run?stopPlay():startPlay();}
function startPlay(){
  initAudio();run=true;done=0;
  document.getElementById('playbtn').textContent='Pausar';
  startPhase(0);updateProg();tmr=setInterval(tick,1000);
}
function stopPlay(){
  run=false;clearInterval(tmr);tmr=null;
  document.getElementById('playbtn').textContent='Iniciar';
  stopSnd();resetOrb();buildRatio(-1);
}
selTech(0);
</script>
</body>
</html>
